eurostat:
  hicp_yoy:
    dataset: prc_hicp_manr
    params:
      unit: RCH_A        # Annual rate of change
      coicop: CP00       # All items
    geographies:
      eurozone: EA
      germany: DE
      france: FR
      italy: IT
      netherlands: NL

  hicp_components:
    dataset: prc_hicp_manr
    params:
      unit: RCH_A        # Annual rate of change
    components:
      All items:                   CP00
      Food & non-alcoholic bev.:   CP011+CP012
      Alcohol & tobacco:           CP021+CP022
      Clothing & footwear:         CP03
      Housing & utilities:         CP04
      Household furnishings:       CP05
      Health:                      CP06
      Transport:                   CP07
      Communication:               CP08
      Recreation & culture:        CP09
      Education:                   CP10
      Restaurants & hotels:        CP11
      Miscellaneous:               CP12
    # Analytical groupings for the breakdown chart (COICOP special aggregates)
    analytical_groups:
      All items:                   CP00
      Services:                    SERV
      Non-energy industrial goods: IGX_E
      Food (incl. alcohol & tab.): TOT_X_NRG_SERV    # proxy; see note
      Energy:                      NRG
      Core (ex. energy & food):    OVERALL_XEFAT0

  debt_gdp:
    dataset: gov_10dd_edpt1
    params:
      unit: PC_GDP
      sector: S13        # General government
      na_item: GD

ecb_sdw:
  yield_curve:
    flow_ref: YC
    key: B.U2.EUR.4F.G_N_A.SV_C_YM
    # Append tenor: .SR_10Y, .SR_2Y, etc.

fred:
  base_url: https://api.stlouisfed.org/fred/series/observations
  series:
    us_cpi_yoy: CPIAUCSL      # Use units=pc1 for YoY
    us_pce_yoy: PCEPI
    japan_cpi: JPNCPIALLMINMEI  # Use units=pc1 for YoY

imf:
  base_url: https://www.imf.org/external/datamapper/api/v1/
  indicators:
    cpi_pct_change: PCPIPCH   # CPI inflation, average consumer prices, % change
  countries:
    japan: JPN
    usa: USA

eia:
  base_url: https://api.eia.gov/v2
  # API key stored in .env as EIA_API_KEY
  datasets:
    international:
      path: international/data
      frequency: annual
      unit: TBPD             # Thousand barrels per day
      products:
        petroleum_total: "57"  # Petroleum and other liquids
      activities:
        production:  "1"
        consumption: "2"
        imports:     "3"
        exports:     "4"
  # Key region codes for oil Sankey
  producer_regions:
    - USA    # United States
    - SAU    # Saudi Arabia
    - RUS    # Russia
    - CAN    # Canada
    - IRQ    # Iraq
    - ARE    # UAE
    - KWT    # Kuwait
    - IRN    # Iran
    - NGA    # Nigeria
    - NOR    # Norway
    - BRA    # Brazil
    - CHN    # China
    - MEX    # Mexico
    - KAZ    # Kazakhstan
    - LBY    # Libya
    - VEN    # Venezuela
    - DZA    # Algeria
    - AGO    # Angola
  consumer_regions:
    - USA    # United States
    - CHN    # China
    - IND    # India
    - SAU    # Saudi Arabia
    - RUS    # Russia
    - BRA    # Brazil
    - KOR    # South Korea
    - CAN    # Canada
    - DEU    # Germany
    - JPN    # Japan
    - MEX    # Mexico
    - GBR    # United Kingdom
    - FRA    # France
    - ITA    # Italy
    - IDN    # Indonesia
    - SGP    # Singapore
    - THA    # Thailand
    - MYS    # Malaysia
    - ARE    # UAE
    - EGY    # Egypt
